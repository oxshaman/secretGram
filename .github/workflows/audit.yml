name: Security Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  crypto-selftest:
    name: Crypto Self-Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node crypto/selftest.js

  crypto-isolation:
    name: Crypto Isolation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node audit/check-crypto-isolation.js

  dependency-hashes:
    name: Vendored Dependency Hashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash audit/check-deps.sh

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx vite build
